<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CocoRoot - Módulo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="comecar.html">
                <img src="../image/logo.jpeg" alt="CocoRoot" width="28" height="28" style="object-fit: contain;">
                <span class="fw-semibold">Voltar ao guia</span>
            </a>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row g-4">
            <div class="col-12 col-lg-8">
                <div class="ratio ratio-16x9 feature-card p-0">
                    <div class="d-flex align-items-center justify-content-center text-muted">Vídeo / Imagem</div>
                </div>

                <div class="mt-3 feature-card p-4">
                    <div class="fw-semibold mb-2">Passo a passo</div>
                    <ol class="mb-0">
                        <li>Leia as instruções do módulo.</li>
                        <li>Prepare os materiais.</li>
                        <li>Execute o procedimento e registe observações.</li>
                    </ol>
                </div>
            </div>
            <div class="col-12 col-lg-4">
                <div class="feature-card p-4 mb-3">
                    <div class="fw-semibold mb-2">Materiais necessários</div>
                    <ul class="mb-0">
                        <li>Substrato de fibra de coco</li>
                        <li>Recipientes</li>
                        <li>Água</li>
                    </ul>
                </div>
                <div class="feature-card p-4">
                    <div class="fw-semibold mb-2">Progresso do módulo</div>
                    <div class="progress" role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar bg-success" style="width: 40%">40%</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
