<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CocoRoot - Detalhe do post</title>
    <meta name="description" content="Leia o post e participe respondendo.">
    <meta property="og:title" content="Detalhe do post">
    <meta property="og:description" content="Leia o post e participe respondendo.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="post-detail">
    <nav class="navbar navbar-expand-lg bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
                <img src="../image/logo.jpeg" alt="CocoRoot" width="32" height="32" style="object-fit: contain;">
                <span class="fw-semibold">CocoRoot</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="comunidade.html">Comunidade</a></li>
                    <li class="nav-item"><a class="nav-link" href="principal.html">Início</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
            <div class="d-flex align-items-center gap-2">
                <a class="btn btn-outline-success rounded-pill px-3" href="comunidade.html">Voltar</a>
                <div class="text-muted small">Comunidade &gt; Post</div>
            </div>
            <a class="btn btn-outline-secondary rounded-pill px-3" href="dashboard.html">Dashboard</a>
        </div>

        <div id="post-banner" class="alert alert-danger" style="display:none;"></div>

        <div class="row g-3">
            <div class="col-12 col-lg-8">
                <div class="feature-card p-4 mb-3" id="post-card"></div>

                <div class="feature-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <div class="h5 m-0">Respostas</div>
                        <span class="badge text-bg-light text-dark" id="replies-count">0</span>
                    </div>
                    <div id="replies-list" class="vstack gap-3"></div>
                    <div id="replies-empty" class="text-muted" style="display:none;">Ainda não há respostas.</div>
                </div>

                <div class="feature-card p-4 mt-3">
                    <div class="h5 mb-2">Escrever resposta</div>
                    <form id="reply-form" class="vstack gap-2">
                        <div>
                            <textarea id="reply-body" class="form-control" rows="3" placeholder="Escreve a tua resposta..."></textarea>
                            <div class="form-text text-danger" id="reply-error" style="display:none;"></div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button id="reply-submit" class="btn btn-success rounded-pill px-4" type="submit">Enviar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="feature-card p-4 h-100">
                    <div class="h5 mb-2">Ações</div>
                    <div class="vstack gap-2">
                        <a class="btn btn-success rounded-pill" href="comunidade.html">Voltar para Comunidade</a>
                        <a class="btn btn-outline-success rounded-pill" href="dashboard.html">Voltar para Dashboard</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
            <div id="post-toast" class="toast" role="status" aria-live="polite" aria-atomic="true">
                <div class="toast-header">
                    <strong class="me-auto">Comunidade</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body" id="post-toast-body"></div>
            </div>
        </div>
    </main>

    <script src="../js/communityData.js"></script>
    <script src="../js/community.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>

</html>
