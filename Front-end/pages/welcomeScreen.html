<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - CocoRoot</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-body">
    <div id="app" class="welcome-page">
        <div class="welcome-container">
            <div class="welcome-image">
                <img src="../image/Coco.jpeg" alt="Coconuts">
            </div>
            <div class="welcome-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <img src="../image/logo.jpeg" alt="CocoRoot Logo">
                    </div>
                    <h1 class="brand-name">CocoRoot</h1>
                    <p class="slogan">Gestão inteligente para os seus cultivos</p>
                </div>

                <div class="feature-card p-4 mb-3" style="max-width: 480px;">
                    <ul class="mb-0">
                        <li>Monitorize as suas culturas em tempo real</li>
                        <li>Receba alertas e dicas personalizadas</li>
                        <li>Aprenda com outros agricultores</li>
                    </ul>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="location.href='login.html'">Entrar</button>
                    <button class="btn-secondary" onclick="location.href='registo.html'">Registar-me</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
